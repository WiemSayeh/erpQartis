<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h2>Department Management</h2>
    <button *ngIf="isAdmin" (click)="openAddModal()" class="btn-add">
      + Add Department
    </button>
  </div>

  <!-- TABLE -->
  <table class="modern-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Description</th>
        <th>Employees</th>
        <th *ngIf="isAdmin">Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let dept of departments">
        <td>{{ dept.name }}</td>
        <td>{{ dept.description }}</td>

        <!-- CLICKABLE EMPLOYEE COUNT -->
        <td>
          <span class="employee-count" (click)="openEmployees(dept)">
            {{ dept.employeeCount }} 👥
          </span>
        </td>

        <td *ngIf="isAdmin">
          <button class="btn edit" (click)="openEditModal(dept)">
            ✏️
          </button>

          <button class="btn delete" (click)="deleteDepartment(dept.id!)">
            🗑
          </button>
        </td>
      </tr>
    </tbody>
  </table>

</div>

<!-- ================= MODAL ADD / EDIT ================= -->
<div class="modal" *ngIf="showModal">
  <div class="modal-content animate">

    <h2>{{ isEditMode ? 'Edit Department' : 'Add Department' }}</h2>

    <div class="input-group">
      <input [(ngModel)]="formDepartment.name" required>
      <label>Name</label>
    </div>

    <div class="input-group">
      <input [(ngModel)]="formDepartment.description">
      <label>Description</label>
    </div>

    <div class="modal-actions">
      <button class="btn save" (click)="saveDepartment()">Save</button>
      <button class="btn cancel" (click)="closeModal()">Cancel</button>
    </div>

  </div>
</div>

<!-- ================= MODAL EMPLOYEES ================= -->
<div class="modal" *ngIf="showEmployeesModal">
  <div class="modal-content animate">

    <h2>Employees</h2>

    <div *ngIf="selectedEmployees.length > 0; else noEmp">
      <ul>
        <li *ngFor="let emp of selectedEmployees">
          👤 {{ emp }}
        </li>
      </ul>
    </div>

    <ng-template #noEmp>
      <p>No employees found</p>
    </ng-template>

    <button class="btn cancel" (click)="closeEmployeesModal()">Close</button>

  </div>
</div>
