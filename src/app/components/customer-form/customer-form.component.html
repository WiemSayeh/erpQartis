<div class="p-8 bg-gray-50 min-h-screen">
  <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md p-6 border border-gray-200">

    <h2 class="text-2xl font-bold text-gray-800 mb-6">
      {{ isEditMode ? 'Modifier les informations du client' : 'Ajouter un nouveau client' }}
    </h2>

    <form (ngSubmit)="onSubmit()" #customerForm="ngForm" class="space-y-4">

      <div>
        <label class="block text-sm font-medium text-gray-700">Nom Complet</label>
        <input type="text" [(ngModel)]="customer.fullName" name="fullName" required
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Email professionnel</label>
          <input type="email" [(ngModel)]="customer.email" name="email" required
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Téléphone</label>
          <input type="text" [(ngModel)]="customer.phone" name="phone"
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Adresse de facturation</label>
        <textarea [(ngModel)]="customer.address" name="address" rows="3"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border"></textarea>
      </div>

      <div class="flex justify-end space-x-3 pt-6 border-t border-gray-100">
        <button type="button" (click)="onCancel()"
          class="bg-white text-gray-700 px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
          Annuler
        </button>
        <button type="submit" [disabled]="!customerForm.form.valid"
          class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition disabled:opacity-50">
          {{ isEditMode ? 'Enregistrer les modifications' : 'Confirmer l\'ajout' }}
        </button>
      </div>
    </form>
  </div>
</div>
