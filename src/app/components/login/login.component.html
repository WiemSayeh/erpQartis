<div class="min-h-screen bg-[#020617] flex items-center justify-center relative overflow-hidden font-sans">

  <div class="absolute inset-0 z-0">
    <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1511919884226-fd3cad34687c?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center opacity-20 scale-125"></div>
    <div class="absolute inset-0 bg-gradient-to-tr from-[#020617] via-transparent to-[#4f46e5]/20"></div>
  </div>

  <div class="relative z-10 w-full max-w-lg p-1">

    <div class="absolute -inset-0.5 bg-gradient-to-r from-indigo-500 to-cyan-400 rounded-[3rem] blur opacity-25"></div>

    <div class="relative bg-[#0f172a]/90 backdrop-blur-3xl rounded-[3rem] border border-white/10 p-10 shadow-2xl overflow-hidden">

      <div class="flex justify-center gap-1 mb-6">
        <div class="h-1 w-8 bg-indigo-500 rounded-full"></div>
        <div class="h-1 w-16 bg-indigo-500/40 rounded-full"></div>
        <div class="h-1 w-8 bg-indigo-500 rounded-full"></div>
      </div>

      <div class="text-center mb-10">
        <h1 class="text-4xl font-extrabold text-white tracking-tighter uppercase italic">
            AUTO<span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">PARTS</span>
        </h1>
        <div class="h-px w-12 bg-indigo-500/50 mx-auto mt-2"></div>
        <p class="text-gray-400 text-xs mt-4 font-bold uppercase tracking-[0.3em]">Sign In</p>
      </div>

      <form (ngSubmit)="onSignIn()" #loginForm="ngForm" class="space-y-7">

        <div class="relative group">
          <label class="block text-xs font-bold text-indigo-400 uppercase mb-2 ml-2 tracking-widest">Email Address</label>
          <div class="flex items-center bg-white/5 border border-white/10 rounded-2xl focus-within:border-cyan-400 focus-within:ring-1 focus-within:ring-cyan-400/50 transition-all duration-500">
            <div class="pl-6 text-gray-500">
                <svg class="size-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="1.5"/></svg>
            </div>
            <input type="email" name="email" [(ngModel)]="credentials.email" required
                placeholder="john.doe@example.com"
                class="w-full bg-transparent text-white px-4 py-5 outline-none placeholder:text-gray-700 text-sm">
          </div>
        </div>

        <div class="relative group">
          <div class="flex justify-between items-center mb-2 px-2">
            <label class="text-xs font-bold text-indigo-400 uppercase tracking-widest">Password</label>
            <a class="text-[10px] text-gray-500 hover:text-cyan-400 cursor-pointer transition-colors uppercase font-bold">Forgot?</a>
          </div>
          <div class="flex items-center bg-white/5 border border-white/10 rounded-2xl focus-within:border-cyan-400 focus-within:ring-1 focus-within:ring-cyan-400/50 transition-all duration-500">
            <div class="pl-6 text-gray-500">
                <svg class="size-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 7a2 2 0 012 2m4 0a6 6 0 11-7.743-5.743L11 7.001l-2 2H7v2H5v2l-4 4V19a2 2 0 002 2h3.172a2 2 0 001.414-.586L20.414 11.586A2 2 0 0021 10.172V7a2 2 0 00-2-2h-2" stroke-width="1.5"/></svg>
            </div>
            <input type="password" name="password" [(ngModel)]="credentials.password" required
                placeholder="••••••••"
                class="w-full bg-transparent text-white px-4 py-5 outline-none placeholder:text-gray-700 text-sm">
          </div>
        </div>

        <button type="submit" [disabled]="!loginForm.form.valid"
            class="w-full relative py-5 rounded-2xl bg-indigo-600 text-white font-black tracking-[0.2em] shadow-[0_10px_30px_rgba(79,70,229,0.3)] hover:bg-indigo-500 active:scale-95 transition-all disabled:opacity-20 uppercase group overflow-hidden">
            <span class="relative z-10">Login</span>
            <div class="absolute inset-0 w-1/4 h-full bg-white/10 skew-x-[45deg] -translate-x-full group-hover:animate-[scan_0.8s_ease-in-out]"></div>
        </button>
      </form>

      <div class="mt-10 text-center border-t border-white/5 pt-8">
        <p class="text-xs text-gray-500 uppercase tracking-widest">
            Don't have an account?
            <a routerLink="/register" class="text-indigo-400 font-extrabold hover:text-cyan-400 transition-colors ml-1 underline underline-offset-4">Register Now</a>
        </p>
      </div>

    </div>
  </div>
</div>

<style>
  @keyframes scan {
    from { transform: translateX(-200%) skewX(45deg); }
    to { transform: translateX(300%) skewX(45deg); }
  }
</style>
