<div class="p-8 bg-slate-50 min-h-screen">
  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-2xl font-bold text-slate-900">Gestion des Fournisseurs</h1>
      <p class="text-slate-500">Liste de tous les partenaires et fournisseurs de pièces.</p>
    </div>
    <button class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition-colors shadow-lg shadow-indigo-200 flex items-center">
      <span class="mr-2">+</span> Nouveau Fournisseur
    </button>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
    <table class="w-full text-left border-collapse">
      <thead class="bg-slate-50 border-b border-slate-200">
        <tr>
          <th class="px-6 py-4 text-sm font-semibold text-slate-600">Nom / Entreprise</th>
          <th class="px-6 py-4 text-sm font-semibold text-slate-600">Email</th>
          <th class="px-6 py-4 text-sm font-semibold text-slate-600">Téléphone</th>
          <th class="px-6 py-4 text-sm font-semibold text-slate-600">Adresse</th>
          <th class="px-6 py-4 text-sm font-semibold text-slate-600 text-right">Actions</th>
        </tr>
      </thead>
     <tbody class="divide-y divide-slate-100">
  <tr *ngFor="let s of suppliers" class="hover:bg-slate-50/50 transition-colors">
    <td class="px-6 py-4">
      <div class="font-medium text-slate-900">{{ s.companyName }}</div>
      <div *ngIf="s.productCount !== undefined" class="text-xs text-slate-400">
        {{ s.productCount }} produits référencés
      </div>
    </td>
    <td class="px-6 py-4 text-slate-600">{{ s.email }}</td>
    <td class="px-6 py-4 text-slate-600">{{ s.telephone }}</td>
    <td class="px-6 py-4 text-slate-600">{{ s.address }}</td>
    <td class="px-6 py-4 text-right space-x-3">
      <button class="text-indigo-600 hover:text-indigo-900 font-medium text-sm">Modifier</button>
      <button (click)="deleteSupplier(s.id)" class="text-red-600 hover:text-red-900 font-medium text-sm">Supprimer</button>
    </td>
  </tr>
</tbody>
    </table>
  </div>
</div>
